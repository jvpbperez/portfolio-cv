<section class="max-w-6xl mx-auto px-6 py-20">
<div class="space-y-6">
  
   <div class="flex items-center gap-4 mb-10">
    <div class="w-12 h-[1px] bg-sky-400"></div>
    <h2 class="text-3xl font-bold">Tecnologias</h2>
   </div>

  <div class="tech-category">
    <h2>🔹 Backend & Data</h2>

    <div class="badges">
      <span *ngFor="let tech of backend" class="badge">
        {{ tech }}
      </span>
    </div>
  </div>


  <div class="tech-category">
    <h2>🌐 Frontend</h2>

    <div class="badges">
      <span *ngFor="let tech of frontend" class="badge">
        {{ tech }}
      </span>
    </div>
  </div>

      <div class="tech-category">
    <h2>🔹 DataBase</h2>

    <div class="badges">
      <span *ngFor="let tech of databases" class="badge">
        {{ tech }}
      </span>
    </div>
  </div>

  <div class="tech-category">
    <h2>🔗 Integration & APIs</h2>

    <div class="badges">
      <span *ngFor="let tech of integration" class="badge">
        {{ tech }}
      </span>
    </div>
  </div>

  <div class="tech-category">
    <h2>⚙️ DevOps</h2>

    <div class="badges">
      <span *ngFor="let tech of devops" class="badge">
        {{ tech }}
      </span>
    </div>
  </div>

  <div class="tech-category">
    <h2>🛠️ Tools</h2>

    <div class="badges">
      <span *ngFor="let tech of tools" class="badge">
        {{ tech }}
      </span>
    </div>
  </div>

  <div class="tech-category">
    <h2>🤖 AI Productivity</h2>

    <div class="badges">
      <span *ngFor="let tech of aiTools" class="badge">
        {{ tech }}
      </span>
    </div>
  </div>
</div>
</section>
