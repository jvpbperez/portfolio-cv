<section class="max-w-6xl mx-auto px-6 py-20">

  <div class="flex items-center gap-4 mb-10">
    <div class="w-12 h-[1px] bg-sky-400"></div>
    <h2 class="text-3xl font-bold">Experiencia</h2>
  </div>

  <div class="space-y-6">

    @for (exp of experiences; track exp.company) {

      <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8">

        <h3 class="text-2xl font-semibold">
          {{ exp.company }}
        </h3>

        <p class="text-sky-400 mt-2">
          {{ exp.role }}
        </p>

        <p class="text-slate-300 mt-4 leading-relaxed">
          {{ exp.description }}
        </p>

      </div>

    }

  </div>

</section>
